version: '3.8'

services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DB_SQL_URL=postgres://user:password@postgres:5432/db_relacional
      - DB_NOSQL_URL=mongodb://mongo:27017/db_nosql
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
      - mongo
    volumes:
      - .:/app

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db_relacional

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  volumes:
    postgres_data:
    mongo_data: